<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash Flow Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D0D0D; color: #F0EBE0; font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 2rem 1rem; }
    h1 { font-family: 'Playfair Display', serif; color: #C9A84C; font-size: clamp(1.8rem, 4vw, 2.6rem); text-align: center; margin-bottom: 0.4rem; }
    .subtitle { text-align: center; opacity: 0.65; margin-bottom: 2rem; font-size: 0.9rem; }
    .container { max-width: 680px; margin: 0 auto; }
    .panel { background: #141414; border: 1px solid #242424; border-radius: 10px; padding: 1.4rem; margin-bottom: 1.1rem; }
    .panel-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; margin-bottom: 1rem; }
    .panel-title.income { color: #C9A84C; }
    .panel-title.expense { color: #e07070; }
    .row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
    .row input[type="text"] { flex: 1; background: #1e1e1e; border: 1px solid #2e2e2e; color: #F0EBE0; padding: 0.6rem 0.85rem; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; }
    .row input[type="text"]:focus { border-color: #C9A84C; }
    .row input.amount { width: 110px; flex: none; text-align: right; }
    .prefix { color: #C9A84C; font-size: 0.9rem; padding: 0 0.2rem; }
    .del-btn { background: transparent; border: none; color: #444; cursor: pointer; font-size: 1rem; padding: 0 0.3rem; transition: color 0.2s; }
    .del-btn:hover { color: #e07070; }
    .add-btn { background: transparent; border: 1px dashed #2e2e2e; color: #666; padding: 0.55rem 1rem; border-radius: 7px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; width: 100%; margin-top: 0.25rem; transition: all 0.2s; }
    .add-btn:hover { border-color: #C9A84C; color: #C9A84C; }
    .summary { background: #141414; border: 1px solid #242424; border-radius: 10px; padding: 1.4rem; margin-bottom: 1.1rem; }
    .summary-title { font-family: 'Playfair Display', serif; color: #C9A84C; font-size: 1.05rem; margin-bottom: 1.1rem; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 0.55rem 0; border-bottom: 1px solid #1e1e1e; font-size: 0.92rem; }
    .summary-row:last-child { border-bottom: none; }
    .summary-label { opacity: 0.65; }
    .val-income { color: #6fcf8e; font-weight: 500; }
    .val-expense { color: #e07070; font-weight: 500; }
    .val-positive { color: #6fcf8e; font-family: 'Playfair Display', serif; font-size: 1.15rem; }
    .val-negative { color: #e07070; font-family: 'Playfair Display', serif; font-size: 1.15rem; }
    .cashflow-bar { background: #1e1e1e; border-radius: 6px; height: 7px; margin: 1rem 0 0.4rem; overflow: hidden; }
    .cashflow-fill { height: 100%; border-radius: 6px; transition: width 0.35s, background 0.35s; }
    .btn-row { display: flex; gap: 0.65rem; margin-bottom: 2.5rem; }
    .btn-outline { background: transparent; border: 1px solid #C9A84C; color: #C9A84C; padding: 0.7rem 1rem; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; flex: 1; transition: all 0.2s; }
    .btn-outline:hover { background: #C9A84C; color: #0D0D0D; }
    footer { text-align: center; opacity: 0.35; font-size: 0.78rem; margin-top: 1rem; }
    @media print {
      body { background: #fff; color: #000; }
      .add-btn, .del-btn, .btn-row, footer { display: none; }
      .panel, .summary { background: #fff; border-color: #ddd; }
      .panel-title.income, .summary-title, .prefix { color: #8B6914; }
      .val-income, .val-positive { color: #2d7a4f; }
      .val-expense, .val-negative { color: #c0392b; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Cash Flow Calculator</h1>
  <p class="subtitle">Add your monthly income and expenses — see your real cash flow instantly.</p>

  <div class="panel">
    <div class="panel-title income">Monthly Income</div>
    <div id="incomeRows"></div>
    <button class="add-btn" onclick="addRow('income')">+ Add income source</button>
  </div>

  <div class="panel">
    <div class="panel-title expense">Monthly Expenses</div>
    <div id="expenseRows"></div>
    <button class="add-btn" onclick="addRow('expense')">+ Add expense</button>
  </div>

  <div class="summary">
    <div class="summary-title">Your Cash Flow Summary</div>
    <div class="summary-row"><span class="summary-label">Total Income</span><span class="val-income" id="totalIncome">$0.00</span></div>
    <div class="summary-row"><span class="summary-label">Total Expenses</span><span class="val-expense" id="totalExpense">$0.00</span></div>
    <div class="cashflow-bar"><div class="cashflow-fill" id="cfBar" style="width:0%;background:#6fcf8e"></div></div>
    <div class="summary-row"><span class="summary-label">Net Cash Flow</span><span id="netFlow" class="val-positive">$0.00</span></div>
    <div class="summary-row"><span class="summary-label">Profit Margin</span><span class="summary-label" id="margin" style="opacity:1">—</span></div>
    <div class="summary-row"><span class="summary-label">Status</span><span class="summary-label" id="runway" style="opacity:1">—</span></div>
  </div>

  <div class="btn-row">
    <button class="btn-outline" id="copyBtn" onclick="copySummary()">Copy Summary</button>
    <button class="btn-outline" onclick="window.print()">Print / PDF</button>
    <button class="btn-outline" onclick="clearAll()">Clear All</button>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const defaults = {
    income:  [['Digital products',''],['Coaching / services',''],['Affiliate income','']],
    expense: [['Software & tools',''],['Marketing & ads',''],['Contractors / team','']]
  };

  function makeRow(type, label='', amount='') {
    const d = document.createElement('div');
    d.className = 'row';
    d.innerHTML = `
      <input type="text" placeholder="${type==='income'?'Income source':'Expense item'}" value="${label}" oninput="calc()">
      <span class="prefix">$</span>
      <input type="text" class="amount" placeholder="0.00" value="${amount}" oninput="this.value=this.value.replace(/[^0-9.]/g,'');calc()">
      <button class="del-btn" onclick="this.closest('.row').remove();calc()">✕</button>`;
    return d;
  }

  function addRow(type, label='', amount='') {
    document.getElementById(type+'Rows').appendChild(makeRow(type, label, amount));
    calc();
  }

  function sumRows(id) {
    return [...document.querySelectorAll(`#${id} .amount`)].reduce((s,el)=>s+(parseFloat(el.value)||0),0);
  }

  function fmt(n) { return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function calc() {
    const inc = sumRows('incomeRows'), exp = sumRows('expenseRows'), net = inc - exp;
    const margin = inc > 0 ? (net/inc*100).toFixed(1)+'%' : '—';
    const pct    = inc > 0 ? Math.min(100, Math.max(0, net/inc*100)) : 0;
    const status = inc===0&&exp===0 ? '—' : net>0 ? 'Cash flow positive ✓' : net===0 ? 'Break-even' : 'Cash flow negative — review expenses';

    document.getElementById('totalIncome').textContent  = fmt(inc);
    document.getElementById('totalExpense').textContent = fmt(exp);
    document.getElementById('margin').textContent       = margin;
    document.getElementById('runway').textContent       = status;

    const nf = document.getElementById('netFlow');
    nf.textContent = fmt(net);
    nf.className   = net >= 0 ? 'val-positive' : 'val-negative';

    const bar = document.getElementById('cfBar');
    bar.style.width      = pct+'%';
    bar.style.background = net >= 0 ? '#6fcf8e' : '#e07070';
  }

  function copySummary() {
    const lines = [
      'CASH FLOW SUMMARY','─'.repeat(28),
      `Total Income:   ${document.getElementById('totalIncome').textContent}`,
      `Total Expenses: ${document.getElementById('totalExpense').textContent}`,
      `Net Cash Flow:  ${document.getElementById('netFlow').textContent}`,
      `Profit Margin:  ${document.getElementById('margin').textContent}`,
      `Status:         ${document.getElementById('runway').textContent}`
    ];
    navigator.clipboard.writeText(lines.join('\n')).then(()=>{
      const b=document.getElementById('copyBtn');
      b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy Summary',1600);
    });
  }

  function clearAll() {
    ['incomeRows','expenseRows'].forEach(id=>document.getElementById(id).innerHTML='');
    defaults.income.forEach(([l,a])=>addRow('income',l,a));
    defaults.expense.forEach(([l,a])=>addRow('expense',l,a));
    calc();
  }

  defaults.income.forEach(([l,a])=>addRow('income',l,a));
  defaults.expense.forEach(([l,a])=>addRow('expense',l,a));
  calc();
</script>
</body>
</html>
